name: Sort and Format wmn-data.json

on:
  push:
    paths:
      - 'wmn-data.json'
      - 'wmn-data-schema.json'

jobs:
  sort-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Initialize npm and install dependencies
        run: |
          npm init -y
          npm install ajv prettier

      - name: Create sorting + validation script
        run: |
          cat << 'EOF' > sort-wmn-data.js
          const fs = require("fs");
          const Ajv = require("ajv");

          const dataPath = "wmn-data.json";
          const schemaPath = "wmn-data-schema.json";

          const data = JSON.parse(fs.readFileSync(dataPath, "utf8"));
          const schema = JSON.parse(fs.readFileSync(schemaPath, "utf8"));

          function sortArrayAlphabetically(arr) {
            return arr.sort((a, b) => a.localeCompare(b));
          }

          function reorderObjectKeys(obj, keyOrder) {
            const reordered = {};
            keyOrder.forEach((key) => {
              if (key in obj) reordered[key] = obj[key];
            });
            Object.keys(obj).forEach((key) => {
              if (!keyOrder.includes(key)) reordered[key] = obj[key];
            });
            return reordered;
          }

          const siteSchema = schema?.properties?.sites?.items;
          if (!siteSchema || !Array.isArray(siteSchema.required)) {
            console.error("Schema is missing 'sites.items.required' structure.");
            process.exit(1);
          }
          const keyOrder = siteSchema.required;

          if (Array.isArray(data.authors)) {
            data.authors = sortArrayAlphabetically(data.authors);
          }

          if (Array.isArray(data.categories)) {
            data.categories = sortArrayAlphabetically(data.categories);
          }

          if (Array.isArray(data.sites)) {
            data.sites.sort((a, b) => a.name.localeCompare(b.name));
            data.sites = data.sites.map((site) =>
              reorderObjectKeys(site, keyOrder)
            );
          }

          const ajv = new Ajv({ allErrors: true });
          const validate = ajv.compile(schema);
          const isValid = validate(data);

          if (!isValid) {
            console.error("Validation failed:");
            console.error(validate.errors);
            process.exit(1);
          }

          const result = JSON.stringify(data, null, 2) + "\\n";
          const original = fs.readFileSync(dataPath, "utf8");
          if (original === result) {
            console.log("No changes. Sorted and validated.");
            process.exit(0);
          }

          fs.writeFileSync(dataPath, result);
          console.log("wmn-data.json sorted and validated successfully.");
          EOF

      - name: Run sort and validate
        run: |
          node sort-wmn-data.js
          prettier --write wmn-data.json

      - name: Commit if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add wmn-data.json
          git diff --cached --quiet || git commit -m "chore: auto-sort and validate wmn-data.json"
          git push

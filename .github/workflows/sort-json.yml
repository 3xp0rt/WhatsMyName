name: Sort and Format wmn-data.json

on:
  push:
    paths:
      - 'wmn-data.json'

jobs:
  sort-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Create sorting script
        run: |
          cat << 'EOF' > sort-wmn-data.js
          const fs = require('fs');

          const filePath = 'wmn-data.json';
          const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));

          if (Array.isArray(data.authors)) {
            data.authors.sort((a, b) => a.localeCompare(b));
          }

          if (Array.isArray(data.categories)) {
            data.categories.sort((a, b) => a.localeCompare(b));
          }

          if (Array.isArray(data.sites)) {
            data.sites.sort((a, b) => a.name.localeCompare(b.name));
          }

          fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
          console.log('Sorted wmn-data.json');
          EOF

      - name: Install Prettier
        run: npm install --global prettier

      - name: Run sorting script and format
        run: |
          node sort-wmn-data.js
          prettier --write wmn-data.json

      - name: Commit if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add wmn-data.json
          git diff --cached --quiet || git commit -m "chore: auto-sort and format wmn-data.json"
          git push
